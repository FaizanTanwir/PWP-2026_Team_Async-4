services:
  db:
    image: postgres:15
    container_name: linguist_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-async_linguist}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - linguist_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: linguist_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    networks:
      - linguist_network
    depends_on:
      - db

networks:
  linguist_network:
    driver: bridge

volumes:
  postgres_data: