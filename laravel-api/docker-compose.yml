services:
  db:
    image: mysql:8.0
    container_name: linguist_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_NAME:-async_linguist}
      MYSQL_USER: ${DB_USERNAME:-user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - linguist_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: linguist_phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "8080:80"
    networks:
      - linguist_network
    depends_on:
      - db

  libretranslate:
    image: libretranslate/libretranslate
    container_name: linguist_translator
    restart: always
    ports:
      - "5000:5000"
    environment:
      - LT_LOAD_ONLY=en,fi,ur,de  # Pre-load specific languages
    networks:
      - linguist_network

networks:
  linguist_network:
    driver: bridge

volumes:
  mysql_data:
