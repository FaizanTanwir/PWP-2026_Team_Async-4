services:

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret} # Fallback value if DB_PASSWORD is not set
      MYSQL_DATABASE: ${DB_DATABASE:-example_app} # Fallback value if DB_DATABASE is not set
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - '3306:3306'
    networks:
      - linguist_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
    ports:
      - '9000:80'
    depends_on:
      - mysql
    networks:
      - linguist_network

  libretranslate:
    image: libretranslate/libretranslate
    container_name: linguist_translator
    restart: always
    ports:
      - "5000:5000"
    environment:
      - LT_LOAD_ONLY=en,fi,ur,de  # Pre-load specific languages
    networks:
      - linguist_network

networks:
  linguist_network:
    driver: bridge

volumes:
  mysql_data:
